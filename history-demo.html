<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Click FIT 训练历史 Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --orange: #FF8A3D;
    --orange-dark: #E8732A;
    --orange-soft: #FFF0E6;
    --ink: #2F2F2F;
    --muted: #707070;
    --paper: #FBFAF5;
    --line: #E9E1D7;
    --green: #34C759;
    --gold: #F5B841;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at top, #FFF4EA 0, #F1EEE9 48%, #E6E2DC 100%);
    color: var(--ink);
    font-family: "DM Sans", system-ui, sans-serif;
  }

  .phone {
    width: min(430px, 100vw);
    min-height: 100dvh;
    background: #F7F7F7;
    overflow-y: auto;
  }

  @media (min-width: 768px) {
    .phone {
      min-height: calc(100dvh - 44px);
      max-height: calc(100dvh - 44px);
      border-radius: 30px;
      box-shadow: 0 24px 70px rgba(0,0,0,.16);
    }
  }

  .header {
    padding: 26px 22px 16px;
    background: white;
    border-bottom: 1px solid #ECECEC;
  }

  .title {
    margin: 0;
    font-family: "Nunito", sans-serif;
    font-size: 26px;
    font-weight: 900;
  }

  .subtitle {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 18px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 22px;
    background: #FFFCF8;
    box-shadow: 0 10px 26px rgba(47,47,47,.05);
  }

  .stat {
    position: relative;
    padding: 10px 8px;
    text-align: center;
  }

  .stat:not(:last-child)::after {
    content: "";
    position: absolute;
    right: -4px;
    top: 16%;
    width: 1px;
    height: 68%;
    background: #EFE5DA;
  }

  .stat strong {
    font-family: "Nunito", sans-serif;
    font-size: 26px;
    line-height: 1;
  }

  .stat .unit {
    margin-left: 2px;
    font-family: "Nunito", sans-serif;
    font-size: 12px;
    font-weight: 900;
  }

  .stat span {
    display: block;
    margin-top: 5px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
  }

  .content { padding: 18px 18px 30px; }

  .section-title {
    margin: 0 0 10px;
    font-family: "Nunito", sans-serif;
    font-size: 15px;
    font-weight: 900;
  }

  .calendar-card,
  .record-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 16px 40px rgba(47,47,47,.08);
  }

  .calendar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .month {
    font-family: "Nunito", sans-serif;
    font-size: 19px;
    font-weight: 900;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--orange);
  }

  .weekdays,
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 7px;
  }

  .weekdays span {
    color: #AAA;
    font-size: 11px;
    font-weight: 900;
    text-align: center;
  }

  .day {
    position: relative;
    aspect-ratio: 1;
    border: 1px solid transparent;
    border-radius: 15px;
    background: rgba(255,255,255,.58);
    color: var(--ink);
    font-weight: 900;
    cursor: pointer;
    overflow: hidden;
    transition: transform .14s ease, border-color .14s ease, background .14s ease;
  }

  .day:active { transform: scale(.95); }
  .day.empty { visibility: hidden; pointer-events: none; }

  .day.today {
    border-color: rgba(255,138,61,.45);
    background: white;
  }

  .day.active {
    border-color: var(--orange);
    background: #FFF8F1;
  }

  .day.done::before {
    content: "";
    position: absolute;
    inset: 8px 6px;
    border: 2.5px solid rgba(255,138,61,.62);
    border-radius: 45% 55% 50% 42%;
    transform: rotate(-10deg);
  }

  .day.done::after {
    content: "DONE";
    position: absolute;
    left: 50%;
    top: 58%;
    transform: translate(-50%, -50%) rotate(-11deg);
    color: rgba(232,115,42,.82);
    font-family: "Nunito", sans-serif;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .4px;
    border: 1.5px solid rgba(232,115,42,.42);
    border-radius: 999px;
    padding: 1px 4px;
  }

  .day.pr .trophy {
    position: absolute;
    right: 3px;
    top: 2px;
    font-size: 12px;
  }

  .day-number {
    position: absolute;
    left: 8px;
    top: 6px;
    font-size: 12px;
  }

  .record-area { margin-top: 18px; }
  .content > .record-area:first-child { margin-top: 0; }
  .calendar-title { margin-top: 18px; }

  .record-card {
    background: linear-gradient(180deg, #FFFFFF 0%, #FFF9F3 100%);
  }

  .record-date {
    margin: 0;
    color: var(--orange-dark);
    font-size: 12px;
    font-weight: 900;
  }

  .record-main {
    margin: 6px 0 14px;
    font-family: "Nunito", sans-serif;
    font-size: 22px;
    font-weight: 900;
  }

  .mini-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .mini {
    border: 1px solid #F0E4D8;
    border-radius: 16px;
    background: rgba(255,255,255,.72);
    padding: 10px 8px;
  }

  .mini strong {
    display: block;
    font-family: "Nunito", sans-serif;
    font-size: 18px;
    line-height: 1;
  }

  .mini span {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 800;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .pill {
    border-radius: 999px;
    background: var(--orange-soft);
    color: var(--orange-dark);
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 900;
  }

  .ai-note {
    border-left: 4px solid var(--orange);
    border-radius: 14px;
    background: rgba(255,138,61,.08);
    padding: 11px 12px;
    color: var(--ink);
    font-size: 13px;
    font-weight: 800;
    line-height: 1.5;
  }

  .empty-record {
    text-align: center;
    padding: 22px 10px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
  }

  .cta {
    margin-top: 14px;
    width: 100%;
    border: none;
    border-radius: 18px;
    background: var(--orange);
    color: white;
    padding: 14px 16px;
    font-family: "Nunito", sans-serif;
    font-size: 15px;
    font-weight: 900;
    box-shadow: 0 12px 28px rgba(255,138,61,.30);
    cursor: pointer;
  }
</style>
</head>
<body>
<main class="phone">
  <header class="header">
    <h1 class="title">训练历史</h1>
    <p class="subtitle">看见自己坚持过，比单纯记数据更重要。</p>
    <div class="stats">
      <div class="stat"><strong id="month-count">0</strong><b class="unit">次</b><span>本月打卡</span></div>
      <div class="stat"><strong id="streak-count">0</strong><b class="unit">次</b><span>当前连续</span></div>
      <div class="stat"><strong id="pr-count">0</strong><b class="unit">次</b><span>突破记录</span></div>
    </div>
  </header>

  <section class="content">
    <div class="record-area">
      <p class="section-title" id="record-title">今日完成</p>
      <div class="record-card" id="record-card"></div>
    </div>

    <p class="section-title calendar-title">打卡日历</p>
    <div class="calendar-card">
      <div class="calendar-head">
        <div class="month" id="month-label">2026年5月</div>
        <div class="legend"><span class="dot"></span><span>已完成</span></div>
      </div>
      <div class="weekdays">
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>
  </section>
</main>

<script>
const demoRecords = {
  "2026-05-04": {
    time: "20:18",
    actions: [{ name: "俯卧撑", sets: 4 }, { name: "深蹲", sets: 3 }],
    rest: "3次 / 90s",
    rice: 2,
    pr: ["俯卧撑"],
    note: "俯卧撑刷新了，今天这波挺硬 🏆 明天别装不记得。"
  },
  "2026-05-09": {
    time: "19:46",
    actions: [{ name: "HIIT", sets: 6 }],
    rest: "2次 / 50s",
    rice: 2,
    pr: [],
    note: "HIIT节奏很紧，没拖泥带水 😎 这不是随便动动。"
  },
  "2026-05-13": {
    time: "21:02",
    actions: [{ name: "硬拉", sets: 5 }, { name: "卷腹", sets: 4 }, { name: "平板支撑", sets: 3 }],
    rest: "4次 / 145s",
    rice: 3,
    pr: ["硬拉"],
    note: "3个动作12组，硬拉还破了记录 🔥 今天有点狠。"
  },
  "2026-05-18": {
    time: "08:32",
    actions: [{ name: "帕梅拉", sets: 3 }],
    rest: "1次 / 30s",
    rice: 1,
    pr: [],
    note: "3组也算赢 🙂 动了就比躺着强，先把火点上。"
  },
  "2026-05-22": {
    time: "20:40",
    actions: [{ name: "深蹲", sets: 4 }, { name: "硬拉", sets: 4 }],
    rest: "3次 / 100s",
    rice: 2,
    pr: [],
    note: "今天8组到手，训练量很实在 💪 稳住，比猛一下靠谱。"
  },
  "2026-05-30": {
    time: "20:56",
    actions: [{ name: "HIIT", sets: 8 }, { name: "俯卧撑", sets: 5 }],
    rest: "4次 / 120s",
    rice: 3,
    pr: ["HIIT"],
    note: "今天13组，HIIT刷新记录了 🏆 这波多巴胺很合理。"
  }
};

const currentYear = 2026;
const currentMonth = 4;
const todayKey = "2026-05-30";
let selectedKey = todayKey;

function pad(num) {
  return String(num).padStart(2, "0");
}

function dateKey(day) {
  return `${currentYear}-${pad(currentMonth + 1)}-${pad(day)}`;
}

function renderCalendar() {
  const grid = document.getElementById("calendar-grid");
  const firstDay = new Date(currentYear, currentMonth, 1);
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const mondayOffset = (firstDay.getDay() + 6) % 7;
  const cells = [];

  for (let i = 0; i < mondayOffset; i++) {
    cells.push('<button class="day empty"></button>');
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const key = dateKey(day);
    const record = demoRecords[key];
    const classes = [
      "day",
      key === todayKey ? "today" : "",
      key === selectedKey ? "active" : "",
      record ? "done" : "",
      record && record.pr.length ? "pr" : ""
    ].filter(Boolean).join(" ");

    cells.push(`
      <button class="${classes}" onclick="selectDate('${key}')">
        <span class="day-number">${day}</span>
        ${record && record.pr.length ? '<span class="trophy">🏆</span>' : ''}
      </button>
    `);
  }

  grid.innerHTML = cells.join("");
  document.getElementById("month-count").textContent = Object.keys(demoRecords).length;
  document.getElementById("streak-count").textContent = "1";
  document.getElementById("pr-count").textContent = Object.values(demoRecords).filter(r => r.pr.length).length;
}

function selectDate(key) {
  selectedKey = key;
  renderCalendar();
  renderRecord();
}

function renderRecord() {
  const card = document.getElementById("record-card");
  const title = document.getElementById("record-title");
  const record = demoRecords[selectedKey];
  const date = new Date(selectedKey);
  const label = selectedKey === todayKey ? "今日完成" : `${date.getMonth() + 1}月${date.getDate()}日训练记录`;
  title.textContent = label;

  if (!record) {
    card.innerHTML = `
      <div class="empty-record">
        这天没有训练记录，休息也算计划的一部分。
        <button class="cta">去完成今天的打卡</button>
      </div>
    `;
    return;
  }

  const totalSets = record.actions.reduce((sum, item) => sum + item.sets, 0);
  card.innerHTML = `
    <p class="record-date">${record.time} 完成</p>
    <div class="mini-stats">
      <div class="mini"><strong>${record.actions.length}</strong><span>动作数</span></div>
      <div class="mini"><strong>${totalSets}</strong><span>总组数</span></div>
      <div class="mini"><strong>${record.rice}碗</strong><span>米饭能量 🍚</span></div>
    </div>
    <div class="actions">
      ${record.actions.map(item => `<span class="pill">${item.name} · ${item.sets}组</span>`).join("")}
    </div>
    <div class="ai-note">${record.note}</div>
  `;
}

renderCalendar();
renderRecord();
</script>
</body>
</html>

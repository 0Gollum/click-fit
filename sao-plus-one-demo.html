<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Click FIT - Sci-fi HUD +1 Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #061322;
    --panel: rgba(8, 28, 50, 0.72);
    --panel-strong: rgba(10, 45, 78, 0.86);
    --cyan: #6FEAFF;
    --cyan-soft: rgba(111, 234, 255, 0.18);
    --blue: #2E8BFF;
    --line: rgba(111, 234, 255, 0.42);
    --text: #EAFBFF;
    --muted: #8DB8CC;
    --gold: #FFE082;
    --green: #7CFFB2;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 50% 12%, rgba(69,162,255,.32), transparent 34%),
      radial-gradient(circle at 18% 82%, rgba(111,234,255,.16), transparent 28%),
      linear-gradient(180deg, #091C31 0%, #04101F 100%);
    color: var(--text);
    font-family: "Rajdhani", system-ui, sans-serif;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(111,234,255,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(111,234,255,.04) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle at center, black 0, transparent 78%);
    pointer-events: none;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(180deg, rgba(255,255,255,.035) 0, rgba(255,255,255,.035) 1px, transparent 1px, transparent 5px);
    opacity: .28;
    pointer-events: none;
  }

  .terminal {
    width: min(430px, 100vw);
    min-height: 100dvh;
    padding: 22px 18px 24px;
    position: relative;
    overflow: hidden;
  }

  @media (min-width: 768px) {
    .terminal {
      min-height: calc(100dvh - 44px);
      border: 1px solid rgba(111,234,255,.22);
      border-radius: 30px;
      box-shadow: 0 0 70px rgba(46,139,255,.18), 0 24px 80px rgba(0,0,0,.34);
      background: rgba(4, 16, 31, .34);
    }
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: .1em;
    font-weight: 700;
    font-size: 12px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 12px var(--green);
  }

  .hud-card {
    position: relative;
    background: linear-gradient(135deg, rgba(9,34,60,.86), rgba(4,19,35,.72));
    border: 1px solid var(--line);
    clip-path: polygon(0 16px, 16px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%);
    box-shadow: inset 0 0 24px rgba(111,234,255,.08), 0 0 28px rgba(46,139,255,.16);
  }

  .hud-card::before,
  .hud-card::after {
    content: "";
    position: absolute;
    width: 54px;
    height: 1px;
    background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan);
  }

  .hud-card::before { top: 10px; right: 16px; }
  .hud-card::after { bottom: 10px; left: 16px; }

  .mission {
    padding: 16px;
    margin-bottom: 14px;
  }

  .mission-title {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .mission h1 {
    margin: 0;
    font-family: "Barlow Condensed", sans-serif;
    font-size: 28px;
    line-height: 1;
    letter-spacing: .03em;
  }

  .mission small {
    color: var(--muted);
    font-weight: 700;
  }

  .exp-bar {
    height: 10px;
    border: 1px solid rgba(111,234,255,.34);
    background: rgba(0,0,0,.22);
    overflow: hidden;
  }

  .exp-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    box-shadow: 0 0 18px rgba(111,234,255,.65);
    transition: width .55s cubic-bezier(.18, 1, .32, 1);
  }

  .action-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .action-chip {
    padding: 11px 10px;
    background: rgba(4, 18, 34, .68);
    border: 1px solid rgba(111,234,255,.24);
    color: var(--muted);
    clip-path: polygon(0 9px, 9px 0, 100% 0, 100% 100%, 0 100%);
  }

  .action-chip.active {
    color: var(--text);
    border-color: var(--cyan);
    background: rgba(14, 57, 92, .74);
    box-shadow: 0 0 22px rgba(111,234,255,.14);
  }

  .action-chip.done {
    color: var(--green);
    border-color: rgba(124,255,178,.46);
  }

  .action-chip strong {
    display: block;
    font-size: 14px;
    line-height: 1;
  }

  .action-chip span {
    display: block;
    margin-top: 5px;
    font-size: 11px;
    font-weight: 700;
  }

  .arena {
    padding: 24px 16px 18px;
    text-align: center;
  }

  .sys-label {
    color: var(--cyan);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .18em;
  }

  .counter-zone {
    position: relative;
    width: 210px;
    height: 210px;
    margin: 14px auto 8px;
    display: grid;
    place-items: center;
  }

  .hex-frame {
    position: absolute;
    inset: 18px;
    background: linear-gradient(135deg, rgba(111,234,255,.12), rgba(46,139,255,.06));
    border: 1px solid rgba(111,234,255,.42);
    clip-path: polygon(50% 0, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
    filter: drop-shadow(0 0 18px rgba(111,234,255,.24));
  }

  .hex-frame::before {
    content: "";
    position: absolute;
    inset: 13px;
    border: 1px solid rgba(111,234,255,.18);
    clip-path: inherit;
  }

  .counter {
    position: relative;
    z-index: 3;
    font-family: "Barlow Condensed", sans-serif;
    font-size: 104px;
    line-height: .9;
    font-weight: 900;
    letter-spacing: .02em;
    color: var(--text);
    text-shadow: 0 0 18px rgba(111,234,255,.78), 0 0 40px rgba(46,139,255,.32);
  }

  .counter.pop {
    animation: counterPop .74s cubic-bezier(.16, 1.24, .32, 1) both;
  }

  @keyframes counterPop {
    0% { transform: scale(1); }
    28% { transform: scale(1.42); color: var(--cyan); }
    56% { transform: scale(.96); }
    78% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .scan-ring {
    position: absolute;
    inset: 30px;
    border: 2px solid rgba(111,234,255,.44);
    border-radius: 50%;
    opacity: 0;
  }

  .scan-ring.run {
    animation: scanRing .82s cubic-bezier(.16, 1, .3, 1) both;
  }

  .scan-ring.run::after {
    content: "";
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    border: 1px solid rgba(255,224,130,.52);
    animation: scanRing .82s cubic-bezier(.16, 1, .3, 1) .1s both;
  }

  @keyframes scanRing {
    0% { transform: scale(.62); opacity: .92; }
    65% { opacity: .28; }
    100% { transform: scale(1.9); opacity: 0; }
  }

  .fly-exp {
    position: absolute;
    left: 50%;
    top: 78%;
    transform: translateX(-50%);
    color: var(--gold);
    font-family: "Barlow Condensed", sans-serif;
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 0 14px rgba(255,224,130,.8);
    opacity: 0;
    z-index: 5;
    pointer-events: none;
  }

  .fly-exp.run {
    animation: flyExp .9s ease-out both;
  }

  @keyframes flyExp {
    0% { transform: translate(-50%, 0) scale(.82); opacity: 0; }
    16% { opacity: 1; }
    100% { transform: translate(-50%, -168px) scale(1.1); opacity: 0; }
  }

  .system-log {
    min-height: 74px;
    margin: 8px 0 20px;
    padding: 12px;
    background: rgba(0,0,0,.22);
    border: 1px solid rgba(111,234,255,.18);
    text-align: left;
  }

  .system-log strong {
    display: block;
    color: var(--cyan);
    font-size: 13px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .system-log span {
    display: block;
    margin-top: 5px;
    color: var(--text);
    font-size: 15px;
    font-weight: 700;
  }

  .system-log.run {
    animation: logFlash .5s ease both;
  }

  @keyframes logFlash {
    0% { box-shadow: 0 0 0 rgba(111,234,255,0); border-color: rgba(111,234,255,.18); }
    45% { box-shadow: 0 0 26px rgba(111,234,255,.22); border-color: rgba(111,234,255,.68); }
    100% { box-shadow: 0 0 0 rgba(111,234,255,0); border-color: rgba(111,234,255,.18); }
  }

  .plus-button {
    position: relative;
    width: 138px;
    height: 138px;
    border: 1px solid rgba(111,234,255,.62);
    background: linear-gradient(135deg, rgba(46,139,255,.88), rgba(111,234,255,.36));
    color: white;
    clip-path: polygon(50% 0, 92% 24%, 92% 76%, 50% 100%, 8% 76%, 8% 24%);
    font-family: "Barlow Condensed", sans-serif;
    font-size: 42px;
    font-weight: 900;
    cursor: pointer;
    text-shadow: 0 0 14px rgba(255,255,255,.75);
    box-shadow: 0 0 30px rgba(111,234,255,.22);
    transition: transform .14s ease, filter .14s ease;
  }

  .plus-button:active {
    transform: scale(.94);
    filter: brightness(1.18);
  }

  .reset {
    display: block;
    margin: 16px auto 0;
    border: 1px solid rgba(111,234,255,.28);
    background: rgba(0,0,0,.18);
    color: var(--muted);
    padding: 10px 16px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
  }

  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 3px;
    height: 18px;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
    opacity: 0;
    animation: particleUp .72s ease-out both;
  }

  @keyframes particleUp {
    0% { transform: translateY(16px) scaleY(.5); opacity: 0; }
    20% { opacity: .9; }
    100% { transform: translateY(-70px) scaleY(1); opacity: 0; }
  }
</style>
</head>
<body>
  <main class="terminal">
    <div class="topbar">
      <span>Click FIT Training HUD</span>
      <span style="display:flex;align-items:center;gap:7px;"><i class="status-dot"></i> ONLINE</span>
    </div>

    <section class="hud-card mission">
      <div class="mission-title">
        <div>
          <h1>DAILY QUEST</h1>
          <small>俯卧撑 · 当前任务</small>
        </div>
        <small id="progressText">0 / 6 SETS</small>
      </div>
      <div class="exp-bar"><div class="exp-fill" id="expFill"></div></div>
    </section>

    <div class="action-grid">
      <div class="action-chip done"><strong>SQUAT</strong><span>DONE · 4</span></div>
      <div class="action-chip active"><strong>PUSH-UP</strong><span id="chipState">ACTIVE · 0</span></div>
      <div class="action-chip"><strong>DEADLIFT</strong><span>WAITING</span></div>
    </div>

    <section class="hud-card arena">
      <div class="sys-label">SET COUNTER</div>

      <div class="counter-zone">
        <div class="hex-frame"></div>
        <div class="scan-ring" id="scanRing"></div>
        <div class="fly-exp" id="flyExp">EXP +1</div>
        <div class="counter" id="counter">0</div>
      </div>

      <div class="system-log" id="systemLog">
        <strong>System Standby</strong>
        <span>完成一组后点击下方核心按钮。</span>
      </div>

      <button class="plus-button" id="plusButton">+1</button>
    </section>

    <button class="reset" id="resetButton">RESET DEMO</button>
    <div class="particles" id="particles"></div>
  </main>

<script>
  let sets = 0;
  const targetSets = 6;
  const counter = document.getElementById('counter');
  const scanRing = document.getElementById('scanRing');
  const flyExp = document.getElementById('flyExp');
  const systemLog = document.getElementById('systemLog');
  const plusButton = document.getElementById('plusButton');
  const resetButton = document.getElementById('resetButton');
  const expFill = document.getElementById('expFill');
  const progressText = document.getElementById('progressText');
  const chipState = document.getElementById('chipState');
  const particles = document.getElementById('particles');

  const lines = [
    '第一组确认。任务已经启动。',
    '第二组记录完成。动作节奏稳定。',
    '第三组达成。身体进入状态。',
    '第四组确认。今日任务推进明显。',
    '第五组完成。已经接近目标。',
    '第六组达成。当前动作任务完成。'
  ];

  function restart(el, className) {
    el.classList.remove(className);
    void el.offsetWidth;
    el.classList.add(className);
  }

  function spawnParticles() {
    for (let i = 0; i < 14; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = `${38 + Math.random() * 24}%`;
      p.style.top = `${58 + Math.random() * 12}%`;
      p.style.animationDelay = `${Math.random() * 0.12}s`;
      p.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;
      particles.appendChild(p);
      window.setTimeout(() => p.remove(), 900);
    }
  }

  function recordSet() {
    sets += 1;
    const cappedSets = Math.min(sets, targetSets);
    const progress = Math.min(100, (cappedSets / targetSets) * 100);

    counter.textContent = sets;
    expFill.style.width = `${progress}%`;
    progressText.textContent = `${cappedSets} / ${targetSets} SETS`;
    chipState.textContent = `ACTIVE · ${sets}`;

    restart(counter, 'pop');
    restart(scanRing, 'run');
    restart(flyExp, 'run');
    restart(systemLog, 'run');
    spawnParticles();

    const line = lines[Math.min(sets - 1, lines.length - 1)];
    systemLog.innerHTML = `<strong>Set Complete</strong><span>${line}</span>`;
  }

  function resetDemo() {
    sets = 0;
    counter.textContent = '0';
    expFill.style.width = '0%';
    progressText.textContent = `0 / ${targetSets} SETS`;
    chipState.textContent = 'ACTIVE · 0';
    systemLog.innerHTML = '<strong>System Standby</strong><span>完成一组后点击下方核心按钮。</span>';
  }

  plusButton.addEventListener('click', recordSet);
  resetButton.addEventListener('click', resetDemo);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Click FIT - One Click, Once Fitness</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #FAFAFA; }
        .max-w-430 { max-width: 430px; margin: 0 auto; }
        .tap-highlight { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="tap-highlight">

<div id="app" class="max-w-430 min-h-screen bg-white shadow-xl">
    <!-- Content will be injected here -->
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-20 left-4 right-4 hidden bg-gray-800 text-white p-4 rounded-xl text-center shadow-lg"></div>

<script>
/** 
 * Click FIT - 修复后的逻辑
 */

// 状态管理
let state = {
    view: 'home', // 默认从首页开始
    streak: 3,
    exercises: ['卧推', '深蹲', '硬拉', '跑步', 'HIIT'],
    currentWorkout: { exercise: '', sets: 0 },
    showGuide: localStorage.getItem('cf_guide_done') !== 'true'
};

// 渲染函数
function render() {
    const app = document.getElementById('app');
    
    // 1. 新手引导逻辑
    if (state.showGuide) {
        app.innerHTML = `
            <div class="h-screen flex flex-col items-center justify-center p-8 text-center">
                <h1 class="text-4xl font-bold text-[#FF8A3D] mb-6">Click FIT</h1>
                <p class="text-gray-600 mb-8">Less Input, More Motion. <br> 极简点击，专注训练。</p>
                <button id="start-btn" class="w-full py-4 bg-[#FF8A3D] text-white rounded-2xl font-bold">开始使用</button>
            </div>
        `;
        document.getElementById('start-btn').onclick = () => {
            state.showGuide = false;
            localStorage.setItem('cf_guide_done', 'true');
            render();
        };
        return;
    }

    // 2. 页面路由逻辑
    if (state.view === 'home') {
        app.innerHTML = `
            <div class="p-6 pt-12">
                <h1 class="text-2xl font-bold text-[#2F2F2F]">Click FIT</h1>
                <div class="mt-6 p-6 bg-[#FF8A3D] text-white rounded-3xl shadow-lg">
                    <div class="text-sm opacity-80">连续打卡</div>
                    <div class="text-4xl font-bold">${state.streak} 天</div>
                </div>
                <div class="mt-8">
                    <h2 class="text-lg font-bold mb-4">开始训练</h2>
                    <div class="grid grid-cols-2 gap-4" id="exercise-list">
                        ${state.exercises.map(ex => `
                            <button data-ex="${ex}" class="ex-btn p-4 border rounded-2xl hover:border-[#FF8A3D] transition">${ex}</button>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        // 绑定事件
        document.querySelectorAll('.ex-btn').forEach(btn => {
            btn.onclick = () => startWorkout(btn.dataset.ex);
        });
    } else if (state.view === 'workout') {
        app.innerHTML = `
            <div class="p-6 h-screen flex flex-col">
                <div class="text-center mt-10">
                    <h2 class="text-xl font-bold">${state.currentWorkout.exercise}</h2>
                    <div class="text-8xl font-black my-8 text-[#FF8A3D]" id="sets-display">${state.currentWorkout.sets}</div>
                    <p class="text-gray-400">已完成组数</p>
                </div>
                <button id="add-btn" class="w-full py-16 bg-[#FF8A3D] text-white rounded-3xl text-3xl font-bold active:scale-95 transition mt-auto mb-4">
                    + 1 组
                </button>
                <div class="flex gap-4">
                    <button id="undo-btn" class="flex-1 py-4 bg-gray-100 rounded-xl font-bold">撤销</button>
                    <button id="finish-btn" class="flex-1 py-4 bg-[#2F2F2F] text-white rounded-xl font-bold">完成训练</button>
                </div>
            </div>
        `;
        document.getElementById('add-btn').onclick = addSet;
        document.getElementById('undo-btn').onclick = undoSet;
        document.getElementById('finish-btn').onclick = finishWorkout;
    }
}

// 逻辑函数
function startWorkout(ex) {
    state.currentWorkout = { exercise: ex, sets: 0 };
    state.view = 'workout';
    render();
}

function addSet() {
    state.currentWorkout.sets++;
    if(navigator.vibrate) navigator.vibrate(100);
    document.getElementById('sets-display').innerText = state.currentWorkout.sets;
}

function undoSet() {
    if(state.currentWorkout.sets > 0) {
        state.currentWorkout.sets--;
        document.getElementById('sets-display').innerText = state.currentWorkout.sets;
    }
}

function finishWorkout() {
    alert("训练完成！保持节奏，下次继续加油。");
    state.view = 'home';
    render();
}

// 启动
render();
</script>
</body>
</html>
